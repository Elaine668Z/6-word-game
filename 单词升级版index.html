<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎮 词汇猎人 · 六级怪物</title>
<style>
:root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text2: #86868b;
    --accent: #0071e3;
    --accent2: #ff3b30;
    --accent3: #ff9500;
    --border: #d2d2d7;
    --shadow: 0 20px 60px rgba(0,0,0,0.08);
    --radius: 24px;
    --radius-sm: 14px;
    --radius-xs: 10px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
}

/* 主容器 */
.app-container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* 卡片通用样式 */
.card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.04);
}

/* 导航栏 */
.nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    margin-bottom: -8px;
}

.nav-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
}

.nav-btns {
    display: flex;
    gap: 8px;
}

.nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.nav-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

.nav-btn:active {
    transform: scale(0.95);
}

.badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--accent2);
    color: white;
    font-size: 11px;
    font-weight: 600;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 怪物卡片 */
.monster-card {
    text-align: center;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
}

.monster-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 60%, rgba(0,113,227,0.04) 0%, transparent 50%);
    pointer-events: none;
}

.monster-emoji {
    font-size: 100px;
    display: inline-block;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.1));
    line-height: 1;
}

.monster-emoji.shake {
    animation: monsterShake 0.4s ease-out;
}

.monster-emoji.crit-shake {
    animation: monsterCritShake 0.5s ease-out;
}

.monster-emoji.ult-hit {
    animation: monsterUltHit 0.6s ease-out;
}

@keyframes monsterShake {
    0%,100%{ transform: translateX(0) rotate(0); }
    20%{ transform: translateX(-8px) rotate(-3deg); }
    40%{ transform: translateX(8px) rotate(3deg); }
    60%{ transform: translateX(-5px) rotate(-2deg); }
    80%{ transform: translateX(5px) rotate(2deg); }
}

@keyframes monsterCritShake {
    0%,100%{ transform: scale(1) rotate(0); }
    20%{ transform: scale(0.85) rotate(-8deg); }
    40%{ transform: scale(1.15) rotate(8deg); }
    60%{ transform: scale(0.9) rotate(-5deg); }
    80%{ transform: scale(1.05) rotate(5deg); }
}

@keyframes monsterUltHit {
    0%{ transform: translateY(0) scale(1); opacity:1; }
    30%{ transform: translateY(-30px) scale(1.2); }
    60%{ transform: translateY(10px) scale(0.8); opacity:0.6; }
    100%{ transform: translateY(0) scale(1); opacity:1; }
}

.monster-name {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
    font-weight: 500;
}

/* 血条 */
.hp-container {
    margin-top: 14px;
}

.hp-bar-outer {
    height: 8px;
    background: #e5e5ea;
    border-radius: 100px;
    overflow: hidden;
}

.hp-bar-inner {
    height: 100%;
    background: var(--accent2);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.hp-label {
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
    font-weight: 500;
}

/* 单词卡片 */
.word-card {
    padding: 20px 24px;
}

.word-main {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    margin-bottom: 4px;
}

.word-pos {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(0,113,227,0.08);
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
}

.word-example {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    font-style: italic;
}

.word-example .blank {
    color: var(--accent);
    font-weight: 600;
    font-style: normal;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--accent3);
}

.word-hint {
    font-size: 12px;
    color: #aeaeb2;
    margin-top: 8px;
}

/* 输入区 */
.input-row {
    display: flex;
    gap: 10px;
}

.input-field {
    flex: 1;
    padding: 16px 20px;
    font-size: 18px;
    font-weight: 500;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    font-family: inherit;
}

.input-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
}

.input-field.correct {
    border-color: #34c759;
    background: rgba(52,199,89,0.04);
}

.input-field.wrong {
    border-color: var(--accent2);
    background: rgba(255,59,48,0.04);
    animation: inputShake 0.3s;
}

@keyframes inputShake {
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
}

.attack-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,113,227,0.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.attack-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(0,113,227,0.4);
}

.attack-btn:active {
    transform: scale(0.92);
    box-shadow: 0 2px 8px rgba(0,113,227,0.2);
}

.attack-btn.ult-ready {
    background: linear-gradient(135deg, #ff9500, #ff3b30);
    box-shadow: 0 4px 20px rgba(255,59,48,0.4);
    animation: ultGlow 0.8s ease-in-out infinite;
}

@keyframes ultGlow {
    0%,100%{ box-shadow: 0 4px 20px rgba(255,59,48,0.4); }
    50%{ box-shadow: 0 8px 36px rgba(255,149,0,0.7); }
}

/* 统计栏 */
.stats-row {
    display: flex;
    gap: 12px;
}

.stat-card {
    flex: 1;
    text-align: center;
    padding: 16px 12px;
    background: var(--card);
    border-radius: var(--radius-sm);
    box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.03);
}

.stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
}

.stat-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
}

.stat-value.combo-high {
    color: var(--accent3);
}

.stat-value.lives-low {
    color: var(--accent2);
}

/* 答案提示条 */
.answer-toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    border: 1px solid rgba(0,0,0,0.06);
}

.answer-toast.show {
    opacity: 1;
}

.answer-toast .correct-word {
    color: var(--accent);
    font-weight: 700;
}

/* 特效层 */
.effects-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 200;
}

/* 大宝剑特效 */
.greatsword {
    position: fixed;
    font-size: 80px;
    pointer-events: none;
    z-index: 200;
    animation: swordSlash 0.7s ease-out forwards;
}

@keyframes swordSlash {
    0% {
        transform: translate(-50%, -50%) rotate(-45deg) scale(0);
        opacity: 1;
    }
    30% {
        transform: translate(-50%, -50%) rotate(10deg) scale(1.5);
        opacity: 1;
    }
    70% {
        transform: translate(-50%, -50%) rotate(5deg) scale(1);
        opacity: 0.8;
    }
    100% {
        transform: translate(-50%, -50%) rotate(0deg) scale(2);
        opacity: 0;
    }
}

/* 伤害数字 */
.float-text {
    position: fixed;
    font-weight: 700;
    pointer-events: none;
    z-index: 200;
    animation: floatAway 0.9s ease-out forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

@keyframes floatAway {
    0%{ opacity:1; transform: translate(-50%,0) scale(0.5); }
    30%{ opacity:1; transform: translate(-50%,-20px) scale(1.2); }
    100%{ opacity:0; transform: translate(-50%,-60px) scale(0.8); }
}

.float-text.crit {
    font-size: 40px;
    color: #ff9500;
}

.float-text.normal {
    font-size: 28px;
    color: #ff3b30;
}

.float-text.heal {
    font-size: 24px;
    color: #34c759;
}

/* 弹窗 */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    width: 90%;
    max-width: 440px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 30px 60px rgba(0,0,0,0.2);
}

.modal h3 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.5px;
}

.modal-close {
    float: right;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #f5f5f7;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
}

.modal-close:hover {
    background: #e5e5ea;
}

/* 词库列表 */
.word-list-item {
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f5;
    cursor: pointer;
    transition: all 0.15s;
}

.word-list-item:hover {
    background: rgba(0,113,227,0.03);
    border-radius: 8px;
    padding-left: 8px;
    padding-right: 8px;
}

.word-list-item:last-child {
    border-bottom: none;
}

.word-list-en {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
}

.word-list-zh {
    font-size: 14px;
    color: var(--text2);
    margin-top: 2px;
}

.word-list-pos {
    font-size: 11px;
    color: var(--accent);
    display: inline-block;
    margin-right: 6px;
}

.word-list-example {
    font-size: 12px;
    color: #aeaeb2;
    margin-top: 4px;
    font-style: italic;
}

/* 错词本为空 */
.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
}

.empty-state .icon {
    font-size: 60px;
    margin-bottom: 12px;
}

/* 搜索框 */
.search-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-xs);
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
    font-family: inherit;
    background: #f9f9fb;
}

.search-input:focus {
    border-color: var(--accent);
    background: white;
}

/* 响应式 */
@media (max-width: 400px) {
    .card {
        padding: 18px;
    }
    .word-main {
        font-size: 28px;
    }
    .monster-emoji {
        font-size: 80px;
    }
}
</style>
</head>
<body>

<div class="app-container" id="appContainer">

    <!-- 导航栏 -->
    <div class="nav-bar">
        <div class="nav-title">词汇猎人</div>
        <div class="nav-btns">
            <button class="nav-btn" onclick="openWordBank()" title="词库">📖</button>
            <button class="nav-btn" onclick="openWrongBook()" title="错词本">
                📝
                <span class="badge" id="wrongBadge" style="display:none">0</span>
            </button>
        </div>
    </div>

    <!-- 怪物卡片 -->
    <div class="card monster-card" id="monsterCard">
        <div class="monster-emoji" id="monsterEmoji">👾</div>
        <div class="monster-name" id="monsterName">暗影魔</div>
        <div class="hp-container">
            <div class="hp-bar-outer">
                <div class="hp-bar-inner" id="hpBar" style="width:100%"></div>
            </div>
            <div class="hp-label" id="hpLabel">❤️ 5 / 5</div>
        </div>
    </div>

    <!-- 单词卡片 -->
    <div class="card word-card">
        <div class="word-main" id="wordZh">废除</div>
        <span class="word-pos" id="wordPos">v.</span>
        <div class="word-example" id="wordExample">
            Many people want to <span class="blank">_____</span> the death penalty.
        </div>
        <div class="word-hint" id="wordHint">💡 按 Tab 查看首字母提示</div>
    </div>

    <!-- 输入行 -->
    <div class="input-row">
        <input type="text" class="input-field" id="answerInput" placeholder="输入英文单词..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="attack-btn" id="attackBtn" onclick="checkAnswer()">⚔️</button>
    </div>

    <!-- 统计栏 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" id="scoreVal">0</div>
            <div class="stat-label">⭐ 分数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value combo-high" id="comboVal">x1</div>
            <div class="stat-label">🔥 连击</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="livesVal">5</div>
            <div class="stat-label">❤️ 生命</div>
        </div>
    </div>

</div>

<!-- 答案提示条 -->
<div class="answer-toast" id="answerToast">
    正确答案：<span class="correct-word" id="toastWord"></span>
</div>

<!-- 特效层 -->
<div class="effects-layer" id="effectsLayer"></div>

<!-- 弹窗：词库 -->
<div class="modal-overlay" id="wordBankModal">
    <div class="modal">
        <button class="modal-close" onclick="closeWordBank()">✕</button>
        <h3>📖 词汇库</h3>
        <input type="text" class="search-input" id="wordSearch" placeholder="搜索单词..." oninput="renderWordBank()">
        <div id="wordBankList"></div>
    </div>
</div>

<!-- 弹窗：错词本 -->
<div class="modal-overlay" id="wrongBookModal">
    <div class="modal">
        <button class="modal-close" onclick="closeWrongBook()">✕</button>
        <h3>📝 错词本</h3>
        <div id="wrongBookList"></div>
        <button style="width:100%;padding:12px;border:none;background:var(--accent2);color:white;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;display:none;" id="clearWrongBtn" onclick="clearWrongBook()">清空错词本</button>
    </div>
</div>

<script>
// ==================== 音效引擎 ====================
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol = 0.15, rampDown = true) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    if (rampDown) {
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    }
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
}

function sfxAttack() {
    playTone(200, 'sawtooth', 0.15, 0.2);
    setTimeout(() => playTone(150, 'square', 0.1, 0.1), 50);
}

function sfxCrit() {
    playTone(300, 'square', 0.2, 0.25);
    setTimeout(() => playTone(500, 'sine', 0.15, 0.15), 80);
    setTimeout(() => playTone(700, 'sine', 0.12, 0.1), 160);
}

function sfxUlt() {
    playTone(60, 'sawtooth', 0.35, 0.3);
    setTimeout(() => playTone(400, 'square', 0.2, 0.2), 100);
    setTimeout(() => playTone(600, 'sine', 0.18, 0.15), 180);
    setTimeout(() => playTone(900, 'sine', 0.15, 0.12), 260);
}

function sfxWrong() {
    playTone(120, 'square', 0.3, 0.15);
    setTimeout(() => playTone(80, 'sawtooth', 0.25, 0.12), 80);
}

function sfxKill() {
    [300,400,500,600,800].forEach((f,i) => {
        setTimeout(() => playTone(f, 'sine', 0.12, 0.1), i*70);
    });
}

// ==================== 词汇库（完整版）====================
const allWords = [
    { zh: "废除", en: "abolish", pos: "v.", example: "Many people want to ___ the death penalty.", meaning: "正式终止（制度/法律）" },
    { zh: "荒谬的", en: "absurd", pos: "adj.", example: "It's ___ to think that the earth is flat.", meaning: "不合逻辑，可笑" },
    { zh: "丰富的", en: "abundant", pos: "adj.", example: "The region has ___ natural resources.", meaning: "大量的，充裕的" },
    { zh: "滥用", en: "abuse", pos: "v./n.", example: "He was accused of ___ing his power.", meaning: "错误/过度使用" },
    { zh: "完成", en: "accomplish", pos: "v.", example: "She managed to ___ her goal within a month.", meaning: "成功做到，达成" },
    { zh: "积累", en: "accumulate", pos: "v.", example: "Dust tends to ___ on the shelves.", meaning: "逐渐增加/堆积" },
    { zh: "指控", en: "accuse", pos: "v.", example: "They ___d him of stealing the money.", meaning: "声称某人做错事" },
    { zh: "承认", en: "acknowledge", pos: "v.", example: "He refused to ___ his mistake.", meaning: "接受/认可事实" },
    { zh: "获得", en: "acquire", pos: "v.", example: "She ___d a good knowledge of French.", meaning: "通过努力得到" },
    { zh: "适应", en: "adapt", pos: "v.", example: "We need to ___ to the changing climate.", meaning: "调整以适合新环境" },
    { zh: "充足的", en: "adequate", pos: "adj.", example: "The food supply is ___ for the trip.", meaning: "足够的，恰当的" },
    { zh: "管理", en: "administer", pos: "v.", example: "They ___ the fund efficiently.", meaning: "组织运作/管理" },
    { zh: "提倡", en: "advocate", pos: "v./n.", example: "He ___s for better education policies.", meaning: "公开支持/倡导者" },
    { zh: "影响", en: "affect", pos: "v.", example: "The weather can ___ your mood greatly.", meaning: "产生影响（动词）" },

    { emoji: "👻", name: "幽灵" },
    { emoji: "🤖", name: "机械兽" },
    { emoji: "💀", name: "骷髅王" },
    { emoji: "🐉", name: "龙王" },
    { emoji: "🦹", name: "超级反派" }
];
let currentMonster = monsters[0];

// ==================== DOM 元素 ====================
const monsterEmoji = document.getElementById('monsterEmoji');
const monsterName = document.getElementById('monsterName');
const hpBar = document.getElementById('hpBar');
const hpLabel = document.getElementById('hpLabel');
const wordZh = document.getElementById('wordZh');
const wordPos = document.getElementById('wordPos');
const wordExample = document.getElementById('wordExample');
const wordHint = document.getElementById('wordHint');
const answerInput = document.getElementById('answerInput');
const attackBtn = document.getElementById('attackBtn');
const scoreVal = document.getElementById('scoreVal');
const comboVal = document.getElementById('comboVal');
const livesVal = document.getElementById('livesVal');
const answerToast = document.getElementById('answerToast');
const toastWord = document.getElementById('toastWord');
const effectsLayer = document.getElementById('effectsLayer');
const wrongBadge = document.getElementById('wrongBadge');
const appContainer = document.getElementById('appContainer');

// ==================== 本地存储 ====================
function saveWrongBook() {
    localStorage.setItem('vocabHunter_wrongBook', JSON.stringify(wrongBook));
}

function loadWrongBook() {
    const saved = localStorage.getItem('vocabHunter_wrongBook');
    if (saved) {
        wrongBook = JSON.parse(saved);
    }
    updateWrongBadge();
}

function addToWrongBook(wordObj) {
    // 避免重复
    const exists = wrongBook.find(w => w.en === wordObj.en);
    if (!exists) {
        wrongBook.push({
            en: wordObj.en,
            zh: wordObj.zh,
            pos: wordObj.pos,
            example: wordObj.example,
            meaning: wordObj.meaning,
            time: new Date().toLocaleString()
        });
        saveWrongBook();
        updateWrongBadge();
    }
}

function clearWrongBook() {
    wrongBook = [];
    saveWrongBook();
    updateWrongBadge();
    renderWrongBook();
}

function updateWrongBadge() {
    if (wrongBook.length > 0) {
        wrongBadge.style.display = 'flex';
        wrongBadge.textContent = wrongBook.length > 99 ? '99+' : wrongBook.length;
    } else {
        wrongBadge.style.display = 'none';
    }
    const clearBtn = document.getElementById('clearWrongBtn');
    if (clearBtn) clearBtn.style.display = wrongBook.length > 0 ? 'block' : 'none';
}

// ==================== 特效 ====================
function createFloatText(x, y, text, cls = 'normal') {
    const el = document.createElement('div');
    el.className = 'float-text ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    effectsLayer.appendChild(el);
    setTimeout(() => el.remove(), 900);
}

function createGreatsword(x, y) {
    const sword = document.createElement('div');
    sword.className = 'greatsword';
    sword.textContent = '🗡️';
    sword.style.left = x + 'px';
    sword.style.top = y + 'px';
    effectsLayer.appendChild(sword);
    setTimeout(() => sword.remove(), 700);
}

function showToast(correctAnswer) {
    toastWord.textContent = correctAnswer;
    answerToast.classList.add('show');
    setTimeout(() => {
        answerToast.classList.remove('show');
    }, 1500);
}

// ==================== 游戏逻辑 ====================
function randomMonster() {
    currentMonster = monsters[Math.floor(Math.random() * monsters.length)];
    monsterEmoji.textContent = currentMonster.emoji;
    monsterName.textContent = currentMonster.name;
    monsterEmoji.style.opacity = '1';
    monsterEmoji.style.transform = 'scale(1) rotate(0deg)';
}

function randomWord() {
    let newWord;
    do {
        newWord = allWords[Math.floor(Math.random() * allWords.length)];
    } while (currentWord && newWord.en === currentWord.en && allWords.length > 1);
    return newWord;
}

function updateHPUI() {
    const pct = (monsterHP / MONSTER_MAX_HP) * 100;
    hpBar.style.width = pct + '%';
    hpLabel.textContent = '❤️ ' + monsterHP + ' / ' + MONSTER_MAX_HP;
    
    // 血条颜色变化
    if (monsterHP <= 2) {
        hpBar.style.background = '#ff3b30';
    } else if (monsterHP <= 3) {
        hpBar.style.background = '#ff9500';
    } else {
        hpBar.style.background = '#ff3b30';
    }
}

function updateStatsUI() {
    scoreVal.textContent = score;
    comboVal.textContent = 'x' + combo;
    livesVal.textContent = lives;
    
    if (combo >= 5) {
        comboVal.classList.add('combo-high');
    } else {
        comboVal.classList.remove('combo-high');
    }
    
    if (lives <= 2) {
        livesVal.classList.add('lives-low');
    } else {
        livesVal.classList.remove('lives-low');
    }
    
    // 攻击按钮效果
    if (combo >= 4) {
        attackBtn.classList.add('ult-ready');
        attackBtn.textContent = '💥';
    } else {
        attackBtn.classList.remove('ult-ready');
        attackBtn.textContent = '⚔️';
    }
}

function displayWord(wordObj) {
    currentWord = wordObj;
    wordZh.textContent = wordObj.zh;
    wordPos.textContent = wordObj.pos;
    
    const exampleHTML = wordObj.example.replace('___', '<span class="blank">_____</span>');
    wordExample.innerHTML = exampleHTML;
    
    wordHint.textContent = '💡 按 Tab 查看首字母提示';
}

function nextWord() {
    const newWord = randomWord();
    displayWord(newWord);
    answerInput.value = '';
    answerInput.focus();
    answerInput.classList.remove('correct', 'wrong');
}

function monsterDie() {
    monsterEmoji.style.transform = 'scale(0) rotate(360deg)';
    monsterEmoji.style.opacity = '0';
    
    sfxKill();
    
    setTimeout(() => {
        monsterHP = MONSTER_MAX_HP;
        updateHPUI();
        randomMonster();
        monsterEmoji.style.transform = 'scale(1) rotate(0deg)';
        monsterEmoji.style.opacity = '1';
    }, 500);
}

function resetGame() {
    score = 0;
    lives = 5;
    combo = 0;
    maxCombo = 0;
    monsterHP = MONSTER_MAX_HP;
    updateHPUI();
    updateStatsUI();
    randomMonster();
    nextWord();
    isWaiting = false;
}

function getMonsterCenter() {
    const rect = monsterEmoji.getBoundingClientRect();
    return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
    };
}

function checkAnswer() {
    if (isWaiting) return;
    if (!currentWord) return;
    
    initAudio();
    
    const answer = answerInput.value.trim().toLowerCase();
    if (!answer) {
        answerInput.placeholder = '⚠️ 请输入单词';
        answerInput.classList.add('wrong');
        setTimeout(() => {
            answerInput.classList.remove('wrong');
            answerInput.placeholder = '输入英文单词...';
        }, 600);
        return;
    }
    
    const correctAnswer = currentWord.en.toLowerCase();
    const monsterPos = getMonsterCenter();
    
    if (answer === correctAnswer) {
        // ✅ 正确
        isWaiting = true;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        score += combo;
        
        answerInput.classList.add('correct');
        
        // 判断是否触发大招（连击5次以上）
        if (combo >= 5) {
            // 大宝剑特效！打3点血
            sfxUlt();
            createGreatsword(monsterPos.x, monsterPos.y - 40);
            monsterEmoji.classList.add('ult-hit');
            setTimeout(() => monsterEmoji.classList.remove('ult-hit'), 600);
            
            const damage = Math.min(3, monsterHP);
            monsterHP -= damage;
            createFloatText(monsterPos.x, monsterPos.y - 20, '⚔️-' + damage, 'crit');
            
            // 屏幕微震
            appContainer.style.transform = 'translateX(-4px)';
            setTimeout(() => appContainer.style.transform = '', 100);
        } else if (combo >= 3) {
            sfxCrit();
            monsterEmoji.classList.add('crit-shake');
            setTimeout(() => monsterEmoji.classList.remove('crit-shake'), 500);
            monsterHP--;
            createFloatText(monsterPos.x + 20, monsterPos.y - 20, '-' + combo, 'crit');
        } else {
            sfxAttack();
            monsterEmoji.classList.add('shake');
            setTimeout(() => monsterEmoji.classList.remove('shake'), 400);
            monsterHP--;
            createFloatText(monsterPos.x + Math.random() * 30, monsterPos.y - 20 + Math.random() * 10, '-' + combo, 'normal');
        }
        
        updateHPUI();
        updateStatsUI();
        
        if (monsterHP <= 0) {
            createFloatText(monsterPos.x, monsterPos.y - 30, '💀击杀！', 'crit');
            monsterDie();
        }
        
        setTimeout(() => {
            answerInput.classList.remove('correct');
            nextWord();
            updateStatsUI();
            isWaiting = false;
        }, monsterHP <= 0 ? 600 : 300);
        
    } else {
        // ❌ 错误
        isWaiting = true;
        lives--;
        combo = 0;
        
        answerInput.classList.add('wrong');
        sfxWrong();
        
        // 加入错词本
        addToWrongBook(currentWord);
        
        // 显示正确答案
        showToast(correctAnswer);
        answerInput.value = '';
        answerInput.placeholder = '❌ 正确答案：' + correctAnswer;
        
        createFloatText(monsterPos.x - 10, monsterPos.y + 30, '💔 -1', 'heal');
        
        updateStatsUI();
        
        if (lives <= 0) {
            setTimeout(() => {
                alert('💀 游戏结束！\n\n最终得分：' + score + ' 分\n最高连击：x' + maxCombo + '\n错词数：' + wrongBook.length);
                resetGame();
            }, 500);
        } else {
            // 停顿1.5秒后进入下一题
            setTimeout(() => {
                answerInput.classList.remove('wrong');
                answerInput.placeholder = '输入英文单词...';
                nextWord();
                updateStatsUI();
                isWaiting = false;
            }, 1500);
        }
    }
}

// ==================== 弹窗 ====================
function openWordBank() {
    document.getElementById('wordBankModal').classList.add('active');
    document.getElementById('wordSearch').value = '';
    renderWordBank();
}

function closeWordBank() {
    document.getElementById('wordBankModal').classList.remove('active');
}

function openWrongBook() {
    document.getElementById('wrongBookModal').classList.add('active');
    renderWrongBook();
}

function closeWrongBook() {
    document.getElementById('wrongBookModal').classList.remove('active');
}

function renderWordBank() {
    const searchTerm = (document.getElementById('wordSearch')?.value || '').toLowerCase();
    const list = document.getElementById('wordBankList');
    
    let filtered = allWords;
    if (searchTerm) {
        filtered = allWords.filter(w => 
            w.en.toLowerCase().includes(searchTerm) || 
            w.zh.includes(searchTerm)
        );
    }
    
    if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配单词</p></div>';
        return;
    }
    
    list.innerHTML = filtered.map(w => `
        <div class="word-list-item" onclick="speakWord('${w.en}')">
            <div class="word-list-en">${w.en} <span class="word-list-pos">${w.pos}</span></div>
            <div class="word-list-zh">${w.zh} — ${w.meaning}</div>
            <div class="word-list-example">${w.example.replace('___', w.en)}</div>
        </div>
    `).join('');
}

function renderWrongBook() {
    const list = document.getElementById('wrongBookList');
    const clearBtn = document.getElementById('clearWrongBtn');
    
    if (wrongBook.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>错词本为空，继续加油！</p></div>';
        if (clearBtn) clearBtn.style.display = 'none';
    } else {
        list.innerHTML = wrongBook.map((w, i) => `
            <div class="word-list-item" onclick="speakWord('${w.en}')">
                <div class="word-list-en">${w.en} <span class="word-list-pos">${w.pos}</span></div>
                <div class="word-list-zh">${w.zh} — ${w.meaning}</div>
                <div class="word-list-example">${w.example.replace('___', w.en)}</div>
                <div style="font-size:10px;color:#aeaeb2;margin-top:2px;">添加于 ${w.time}</div>
            </div>
        `).join('');
        if (clearBtn) clearBtn.style.display = 'block';
    }
}

// TTS 朗读
function speakWord(word) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
    }
}

// ==================== 事件监听 ====================
answerInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        checkAnswer();
    }
});

answerInput.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        if (currentWord && !isWaiting) {
            answerInput.value = currentWord.en[0];
            wordHint.textContent = '💡 首字母：' + currentWord.en[0].toUpperCase() + ' （' + currentWord.en.length + '个字母）';
        }
    }
});

// 点击模态框外部关闭
document.getElementById('wordBankModal').addEventListener('click', function(e) {
    if (e.target === this) closeWordBank();
});
document.getElementById('wrongBookModal').addEventListener('click', function(e) {
    if (e.target === this) closeWrongBook();
});

// ESC 关闭弹窗
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeWordBank();
        closeWrongBook();
    }
});

// 首次点击初始化音频
document.addEventListener('click', initAudio, { once: true });

// ==================== 启动 ====================
loadWrongBook();
randomMonster();
nextWord();
updateHPUI();
updateStatsUI();
answerInput.focus();
</script>
</body>
</html>
